name: WASM CI
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        node_version:
          - 24
    steps:
      - uses: actions/checkout@v7
      - uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true
          target: wasm32-unknown-unknown
      - uses: taiki-e/cache-cargo-install-action@v3
        with:
          # needs to match Cargo.toml and flake.nix version
          tool: wasm-bindgen-cli@0.2.108
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node_version }}
          cache: yarn
      - name: Install modules
        run: yarn
      # Older @puppeteer/browsers left the Chrome zip unextracted, so we extract
      # it ourselves. Current versions extract during install and leave no zip,
      # so the existence guard skips the loop in that case rather than failing on
      # a literal `*.zip` under `bash -e`.
      - name: Install Chrome for Puppeteer
        run: |
          rm -rf ~/.cache/puppeteer
          yarn puppeteer browsers install chrome
          cd ~/.cache/puppeteer/chrome
          for z in *.zip; do
            [ -e "$z" ] || continue
            ver="${z%-chrome-linux64.zip}"
            rm -rf "linux-${ver}"
            unzip -oq "$z" -d "linux-${ver}/"
            rm "$z"
          done
      - name: Compile
        run: cargo update && yarn run compile
      - name: Run tests
        run: yarn run test
      - name: Test build
        run: ./build.js
